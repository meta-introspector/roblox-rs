name: Build & Lint Monster Gyroscope

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Luau
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with:
          submodules: true

      - uses: meta-introspector/install-nix-action@v27

      - name: Lint with selene
        run: nix develop -c selene src/ scripts/ || echo "selene not in flake yet, skipping"

      - name: Check syntax
        run: nix develop -c lune run scripts/monster_gyroscope

  build:
    name: Build .rbxl
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with:
          submodules: true

      - uses: meta-introspector/install-nix-action@v27

      - name: Build with Lune
        run: nix develop -c lune run scripts/build_gyroscope

      - name: Upload artifacts
        uses: meta-introspector/upload-artifact@v4
        with:
          name: monster-gyroscope-rbxl
          path: output/roblox/*.rbxl

  analysis:
    name: Run Gyroscope Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with:
          submodules: true

      - uses: meta-introspector/install-nix-action@v27

      - name: Run Monster Gyroscope analysis
        run: nix develop -c lune run scripts/monster_gyroscope | tee output/analysis.txt

      - name: Upload analysis
        uses: meta-introspector/upload-artifact@v4
        with:
          name: gyroscope-analysis
          path: output/analysis.txt

  publish:
    name: Publish to Pastebin
    runs-on: ubuntu-latest
    needs: [build, analysis]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: meta-introspector/checkout@v4
        with:
          submodules: true

      - uses: meta-introspector/install-nix-action@v27

      - name: Build and publish
        run: |
          mkdir -p output
          nix develop -c lune run scripts/build_gyroscope
          CONTENT=$(nix develop -c lune run scripts/monster_gyroscope 2>&1)
          curl -s -X POST https://solana.solfunmeme.com/pastebin/paste \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg content "$CONTENT" \
              --arg title "Monster Gyroscope CI Build $(date -u +%Y%m%d_%H%M%S)" \
              --argjson keywords '["gyroscope","ci","build","monster","cl15","196883"]' \
              '{title: $title, content: $content, keywords: $keywords}')"
